# Fly.io configuration for AI Storefront Optimizer.
# Set secrets before first deploy:
#   fly secrets set SHOPIFY_API_KEY=... SHOPIFY_API_SECRET=... SHOPIFY_APP_URL=https://<app>.fly.dev \
#     SCOPES=read_products,write_products,read_files,write_files ANTHROPIC_API_KEY=...
# Provision Postgres and attach (sets DATABASE_URL automatically):
#   fly postgres create  &&  fly postgres attach <pg-app-name>

app = "ai-storefront-optimizer"
primary_region = "iad"

[build]

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
