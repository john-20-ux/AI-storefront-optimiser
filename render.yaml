# Render Blueprint for AI Storefront Optimizer.
# In Render: New → Blueprint → connect this repo. It provisions the web service +
# Postgres, then set the four `sync: false` secrets in the dashboard:
#   ENCRYPTION_KEY, SHOPIFY_API_KEY, SHOPIFY_API_SECRET, SHOPIFY_APP_URL
# (SHOPIFY_APP_URL = https://<service-name>.onrender.com)

services:
  - type: web
    name: ai-storefront-optimizer
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free # trial; spins down after ~15 min idle. Switch to "starter" for always-on.
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: SCOPES
        value: read_products,write_products,read_files,write_files
      - key: DATABASE_URL
        fromDatabase:
          name: ai-storefront-db
          property: connectionString
      - key: ENCRYPTION_KEY
        sync: false
      - key: SHOPIFY_API_KEY
        sync: false
      - key: SHOPIFY_API_SECRET
        sync: false
      - key: SHOPIFY_APP_URL
        sync: false

databases:
  - name: ai-storefront-db
    plan: free # trial; expires after 30 days. Switch to "basic-256mb" to keep it.
